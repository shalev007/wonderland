services:
  demo:
  wmts:

layers:
  - name: ortophoto
    title: Ortophoto Israel
    sources: [ortophoto_3857]

caches:
  ortophoto_epsg4326:
    grids: [epsg4326]
    sources: []
    upscale_tiles: 5
    cache:
      type: geopackage
      filename: /mapproxy/maps/orto.gpkg
      table_name: ortophoto_israel_2025

  ortophoto_3857:
    grids: [webmercator]
    sources: [ortophoto_epsg4326]
    upscale_tiles: 5
    cache:
      type: geopackage
      filename: /mapproxy/maps/ortophoto_3857.gpkg
      table_name: ortophoto_israel_2025

grids:
  epsg4326:
    srs: 'EPSG:4326'
    origin: 'nw'
    bbox: [-180, -90, 180, 90]
    min_res: 0.703125
    num_levels: 22
  webmercator:
    srs: 'EPSG:3857'
    origin: 'nw'
    tile_size: [256, 256]
