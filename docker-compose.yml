
services:
  mapproxy:
      image: kartoza/mapproxy:latest
      container_name: map-proxy-server
      volumes:
        - ./mapproxy/mapproxy.yml:/mapproxy/mapproxy.yml:ro
        - ./mapproxy/maps:/mapproxy/maps
      ports:
        - "8081:8081"
      networks:
        - magenim-net
      restart: unless-stopped
      command: >
        mapproxy-util serve-develop /mapproxy/mapproxy.yml -b 0.0.0.0:8081

  postgres:
    image: postgis/postgis:16-3.4
    container_name: magenim-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: wonderland
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - magenim-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d wonderland"]
      interval: 5s
      timeout: 5s
      retries: 10

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: wonderland-mediamtx
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "9997:9997"
      - "8189:8189/udp"
      - "8199:8199"
      - "9996:9996"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings
    networks:
      - magenim-net
    restart: unless-stopped

  migrations:
    image: postgis/postgis:16-3.4
    container_name: magenim-migrations
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: admin
      PGPASSWORD: admin
      PGDATABASE: wonderland
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - magenim-net
    entrypoint: >
      sh -c "echo 'Database is ready. No pending migrations.' && exit 0"
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: magenim-backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: admin
      DB_PASSWORD: admin
      DB_NAME: wonderland
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_PLAYBACK_URL: http://mediamtx:9996
      MEDIAMTX_HLS_URL: http://mediamtx:8888
      STORAGE_BASE_URL: http://localhost:3000/static
      RECORDINGS_PATH: /recordings
    volumes:
      - ./recordings:/recordings
    depends_on:
      migrations:
        condition: service_completed_successfully
      mediamtx:
        condition: service_started
    networks:
      - magenim-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_MAGENIM_BACKEND_URL: http://localhost:3000
    container_name: magenim-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - magenim-net
    restart: unless-stopped

networks:
  magenim-net:
    driver: bridge

volumes:
  postgres_data:
